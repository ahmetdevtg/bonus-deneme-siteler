<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonus Rehberi</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body {
  background: linear-gradient(180deg, #0a0a0a, #111);
  color:white;
}

/* HEADER */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111;
  position:sticky;
  top:0;
  z-index:999;
}

.topbar a {
  background:#0088cc;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  text-decoration:none;
  font-size:14px;
  font-weight:bold;
}

/* TITLE */
.title {
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

/* CARD */
.card {
  margin:15px;
  padding:15px;
  border-radius:14px;
  background: linear-gradient(145deg, #1a1a1a, #111);
  box-shadow:0 0 15px rgba(0,255,200,0.1);
}

.card h3 {
  margin-bottom:5px;
}

.card p {
  font-size:14px;
  color:#aaa;
}

.btn {
  display:block;
  margin-top:10px;
  background:linear-gradient(90deg,#00ffd5,#00c896);
  padding:12px;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

/* TELEGRAM BOX */
.telegram-box {
  margin:20px;
  padding:20px;
  border-radius:15px;
  background: linear-gradient(135deg,#0088cc,#005f99);
  text-align:center;
}

.telegram-box a {
  display:inline-block;
  margin-top:10px;
  background:white;
  color:#0088cc;
  padding:10px 15px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}
</style>

</head>

<body>

<!-- TOP -->
<div class="topbar">
  <a href="#">📩 İletişim</a>
  <a href="#">📲 Kanalımız</a>
</div>

<div class="title">🔥 GÜNCEL BONUS SİTELERİ</div>

<!-- CARDS -->
<div class="card">
  <h3>🎁 Site 1</h3>
  <p>300₺ Deneme Bonusu</p>
  <a href="#" class="btn">HEMEN KATIL</a>
</div>

<div class="card">
  <h3>💎 Site 2</h3>
  <p>%100 Hoşgeldin Bonusu</p>
  <a href="#" class="btn">HEMEN KATIL</a>
</div>

<div class="card">
  <h3>🚀 Site 3</h3>
  <p>Çevrimsiz Kazanç Fırsatı</p>
  <a href="#" class="btn">HEMEN KATIL</a>
</div>

<!-- TELEGRAM -->
<div class="telegram-box">
  <h2>📲 Telegram Kanalımıza Katıl</h2>
  <p>En hızlı güncellemeler burada!</p>
  <a href="#">KANALA GİT</a>
</div>

</body>
</html>
