<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonus Rehberi</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

.topbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}

.topbar a {
  background:#0088cc;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

.container {
  padding:10px;
}

.card {
  background:#1a1a1a;
  margin:15px 0;
  padding:15px;
  border-radius:12px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.btn {
  display:block;
  margin-top:10px;
  background:#00ffd5;
  padding:10px;
  text-align:center;
  border-radius:8px;
  color:black;
  text-decoration:none;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="topbar">
  <a href="#">📩 İletişim</a>
  <a href="#">📲 Kanalımız</a>
</div>

<div class="container" id="siteList"></div>

<script>
fetch('sites.json')
.then(res => res.json())
.then(data => {
  const container = document.getElementById('siteList');

  data.forEach(site => {
    const card = `
      <div class="card">
        <img src="${site.resim}">
        <h3>${site.isim}</h3>
        <p>${site.aciklama}</p>
        <a href="${site.link}" class="btn">HEMEN KATIL</a>
      </div>
    `;
    container.innerHTML += card;
  });
});
</script>

</body>
</html>
