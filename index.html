<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yükleniyor...</title>
<meta name="description" content="">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    padding: 25px;
    text-align: center;
    background: #1e293b;
}

main {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

article {
    background: #1e293b;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

a {
    display: inline-block;
    margin-top: 10px;
    color: #38bdf8;
    text-decoration: none;
}

h2 {
    margin-top: 40px;
}
</style>

</head>

<body>

<header>
    <h1 id="siteTitle">Yükleniyor...</h1>
    <p id="siteDesc"></p>
</header>

<main>

<div id="content"></div>

<h2>Önerilen Siteler</h2>
<div id="sites"></div>

</main>

<script>

// URL'den page al
const params = new URLSearchParams(window.location.search);
const page = params.get("page");


// DATA.JSON
fetch("data.json")
.then(res => res.json())
.then(data => {

    document.title = data.site.title;

    document.querySelector("meta[name='description']")
    .setAttribute("content", data.site.description);

    document.getElementById("siteTitle").innerText = data.site.title;
    document.getElementById("siteDesc").innerText = data.site.description;

    let area = document.getElementById("content");

    // TEKİL SAYFA
    if(page){
        let article = data.articles.find(a => a.slug === page);

        if(article){
            document.title = article.title;

 fetch("sites.json")
.then(r => r.json())
.then(sitesData => {

    let randomSites = sitesData.sites
        .sort(() => 0.5 - Math.random())
        .slice(0, 2);

    let sitesHTML = "";

    randomSites.forEach(site => {
        sitesHTML += `
        <div style="margin-top:15px;padding:10px;background:#0f172a;border-radius:8px;">
            <strong>${site.name}</strong>
            <p>${site.description}</p>
            <a href="${site.url}" target="_blank">Hemen Giriş Yap</a>
        </div>
        `;
    });

    area.innerHTML = `
        <article>
            <h1>${article.title}</h1>
            <p>${article.content}</p>

            <h3>Önerilen Platformlar</h3>
            ${sitesHTML}
        </article>
    `;

});
        } else {
            area.innerHTML = "<p>İçerik bulunamadı.</p>";
        }

    } else {
        // ANA SAYFA
        data.articles.forEach(a => {
            area.innerHTML += `
            <article>
                <h2>${a.title}</h2>
                <p>${a.description}</p>
                <a href="?page=${a.slug}">Devamını Oku</a>
            </article>
            `;
        });
    }

});


// SİTELER
fetch("sites.json")
.then(res => res.json())
.then(data => {

    let area = document.getElementById("sites");

    data.sites.forEach(site => {
        area.innerHTML += `
        <article>
            <h3>${site.name}</h3>
            <p>${site.description}</p>
            <a href="${site.url}" target="_blank">Siteye Git</a>
        </article>
        `;
    });

});

</script>

</body>
</html>
