<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yükleniyor...</title>
<meta name="description" content="">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
}

h1 {
    margin: 0;
}

main {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

article {
    background: #1e293b;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

a {
    display: inline-block;
    margin-top: 10px;
    color: #38bdf8;
    text-decoration: none;
}
</style>

</head>

<body>

<header>
    <h1 id="siteTitle">Yükleniyor...</h1>
    <p id="siteDesc"></p>
</header>

<main id="articles"></main>

<script>
fetch("data.json")
.then(res => res.json())
.then(data => {

    document.title = data.site.title;
    document.querySelector("meta[name='description']")
    .setAttribute("content", data.site.description);

    document.getElementById("siteTitle").innerText = data.site.title;
    document.getElementById("siteDesc").innerText = data.site.description;

    let area = document.getElementById("articles");

    data.articles.forEach(a => {
        area.innerHTML += `
        <article>
            <h2>${a.title}</h2>
            <p>${a.description}</p>
            <a href="?page=${a.slug}">Devamını Oku</a>
        </article>
        `;
    });

});
</script>

</body>
</html>
